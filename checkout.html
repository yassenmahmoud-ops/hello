<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout — MarketPro</title>
    <link rel="stylesheet" href="/output.css">
  </head>
  <body class="font-sans antialiased bg-gray-50" data-page-action="back-store">
    <div class="pointer-events-none fixed inset-0 overflow-hidden">
      <div class="ambient-gradient"></div>
    </div>
    <main class="max-w-3xl mx-auto p-6 space-y-6">
      <h1 class="text-2xl font-semibold mb-4 fade-in-up">الدفع</h1>
      <section class="hero-card glow-ring lift-in fade-in-up bg-white p-4 rounded-2xl shadow mb-6">
        <div id="checkoutItems" class="space-y-3"></div>
        <div class="mt-4 flex items-center justify-between">
          <div class="font-semibold">المجموع:</div>
          <div id="checkoutTotal" class="font-bold">$0</div>
        </div>
      </section>

      <section class="hero-card glow-ring lift-in fade-in-up bg-white p-4 rounded-2xl shadow">
        <h2 class="mb-3">معلومات الدفع (تجريبي)</h2>
        <form id="checkoutForm" class="grid gap-3">
          <input placeholder="الاسم" class="motion-input px-3 py-2 border border-gray-200 rounded-xl bg-white/90" />
          <input placeholder="البريد الإلكتروني" class="motion-input px-3 py-2 border border-gray-200 rounded-xl bg-white/90" />
          <input placeholder="العنوان" class="motion-input px-3 py-2 border border-gray-200 rounded-xl bg-white/90" />
          <div class="flex w-full items-center justify-between gap-3 flex-wrap flex-row-reverse sm:flex-row">
            <div class="flex gap-2 w-full sm:w-auto justify-end">
              <a href="/index.html" class="motion-btn px-3 py-2 bg-slate-200 text-slate-800 rounded-xl">المتجر</a>
              <button id="clearCheckoutBtn" type="button" class="motion-btn hidden px-3 py-2 bg-rose-500 text-white rounded-xl">حذف الكل</button>
            </div>
            <div class="w-full sm:w-auto flex justify-start sm:justify-end">
              <button id="placeOrder" class="motion-btn px-3 py-2 bg-indigo-600 text-white rounded-xl">إتمام الطلب</button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script type="module" src="/src/checkout.js"></script>
  </body>
</html>
